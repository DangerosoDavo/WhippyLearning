<!DOCTYPE html>
<html>
  <head>
    <title>ChatApp - Broadcasting</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: Arial, sans-serif;
        background-color: #1a1a2e;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      #chat-app {
        width: 420px;
        height: 650px;
        background-color: white;
        border-radius: 12px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      }
      #chat-header {
        background-color: #6c5ce7;
        color: white;
        padding: 12px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      #chat-header h1 { font-size: 18px; font-weight: normal; }
      #header-right {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      #user-count {
        font-size: 11px;
        background-color: rgba(255,255,255,0.2);
        padding: 3px 8px;
        border-radius: 10px;
      }
      #username-input {
        padding: 5px 10px;
        border: none;
        border-radius: 12px;
        font-size: 12px;
        width: 90px;
        outline: none;
      }
      #connection-status {
        font-size: 11px;
        padding: 6px 12px;
        text-align: center;
      }
      .connecting { background-color: #fff3cd; color: #856404; }
      .connected { background-color: #d4edda; color: #155724; }
      .disconnected { background-color: #f8d7da; color: #721c24; }
      #chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 15px;
        background-color: #f8f9fa;
      }
      .system-msg {
        text-align: center;
        color: #999;
        font-size: 12px;
        margin: 10px 0;
        font-style: italic;
      }
      .message {
        max-width: 75%;
        padding: 10px 15px;
        margin: 4px 10px;
        border-radius: 18px;
        font-size: 14px;
        word-wrap: break-word;
      }
      .message.sent {
        background-color: #6c5ce7;
        color: white;
        margin-left: auto;
      }
      .message.received {
        background-color: #e9ecef;
        color: #333;
        margin-right: auto;
      }
      .sender-name {
        font-size: 11px;
        color: #999;
        margin: 8px 12px 2px 12px;
      }
      .sender-name.sent-name { text-align: right; }
      .time-stamp {
        font-size: 10px;
        color: #bbb;
        margin: 1px 12px 4px 12px;
      }
      .time-stamp.sent-time { text-align: right; }
      #chat-input-area {
        display: flex;
        padding: 10px;
        background-color: white;
        border-top: 1px solid #eee;
      }
      #message-input {
        flex: 1;
        padding: 10px 15px;
        border: 1px solid #ddd;
        border-radius: 20px;
        font-size: 14px;
        outline: none;
      }
      #message-input:focus { border-color: #6c5ce7; }
      #send-btn {
        background-color: #6c5ce7;
        color: white;
        border: none;
        padding: 10px 20px;
        margin-left: 8px;
        border-radius: 20px;
        font-size: 14px;
        cursor: pointer;
      }
      #send-btn:hover { background-color: #5a4bd1; }
      #send-btn:disabled { background-color: #ccc; cursor: not-allowed; }
    </style>
  </head>
  <body>

    <div id="chat-app">
      <div id="chat-header">
        <h1>ChatApp</h1>
        <div id="header-right">
          <span id="user-count">0 online</span>
          <input type="text" id="username-input" value="Bret" placeholder="Your name">
        </div>
      </div>
      <div id="connection-status" class="connecting">Connecting...</div>
      <div id="chat-messages"></div>
      <div id="chat-input-area">
        <input type="text" id="message-input" placeholder="Type a message..." disabled>
        <button id="send-btn" disabled>Send</button>
      </div>
    </div>

    <script>
      let chatMessages = document.getElementById("chat-messages");
      let messageInput = document.getElementById("message-input");
      let sendBtn = document.getElementById("send-btn");
      let usernameInput = document.getElementById("username-input");
      let connectionStatus = document.getElementById("connection-status");
      let userCount = document.getElementById("user-count");

      let ws = null;

      function addSystemMessage(text) {
        let div = document.createElement("div");
        div.classList.add("system-msg");
        div.textContent = text;
        chatMessages.appendChild(div);
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }

      function updateStatus(state) {
        connectionStatus.className = state;
        if (state === "connecting") connectionStatus.textContent = "Connecting...";
        if (state === "connected") connectionStatus.textContent = "Connected";
        if (state === "disconnected") connectionStatus.textContent = "Disconnected — reconnecting...";
        messageInput.disabled = (state !== "connected");
        sendBtn.disabled = (state !== "connected");
      }

      function displayMessage(message) {
        let currentUser = usernameInput.value.trim() || "Anonymous";
        let isSent = (message.sender === currentUser);

        let senderDiv = document.createElement("div");
        senderDiv.classList.add("sender-name");
        senderDiv.textContent = message.sender;
        if (isSent) senderDiv.classList.add("sent-name");

        let messageDiv = document.createElement("div");
        messageDiv.classList.add("message");
        messageDiv.textContent = message.text;
        messageDiv.classList.add(isSent ? "sent" : "received");

        let timeDiv = document.createElement("div");
        timeDiv.classList.add("time-stamp");
        timeDiv.textContent = message.time;
        if (isSent) timeDiv.classList.add("sent-time");

        chatMessages.appendChild(senderDiv);
        chatMessages.appendChild(messageDiv);
        chatMessages.appendChild(timeDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }

      function sendMessage() {
        let text = messageInput.value.trim();
        let sender = usernameInput.value.trim() || "Anonymous";
        if (!text || ws.readyState !== WebSocket.OPEN) return;

        let message = {
          sender: sender,
          text: text,
          time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        };

        ws.send(JSON.stringify(message));
        messageInput.value = "";
        messageInput.focus();
      }

      sendBtn.addEventListener("click", sendMessage);
      messageInput.addEventListener("keydown", function(e) {
        if (e.key === "Enter") sendMessage();
      });

      // ==========================================
      // EXERCISE 1: Handle message types
      //
      // Update ws.onmessage to check message.type:
      //   - "system" → call addSystemMessage(message.text)
      //   - "usercount" → update the user count display
      //   - "chat" (or anything else) → call displayMessage
      //
      // The server sends three types:
      //   { type: "system", text: "Bret joined the chat" }
      //   { type: "usercount", text: "3" }
      //   { type: "chat", sender: "Bret", text: "Hello!" }
      // ==========================================

      function connect() {
        updateStatus("connecting");
        ws = new WebSocket("ws://localhost:8080/ws");

        ws.onopen = function() {
          updateStatus("connected");
          addSystemMessage("Connected to server!");
          messageInput.focus();
        };

        ws.onmessage = function(event) {
          let message = JSON.parse(event.data);

          // EXERCISE 1: Handle different message types
          // YOUR CODE HERE:
          //
          // if (message.type === "system") {
          //     addSystemMessage(message.text);
          // } else if (message.type === "usercount") {
          //     userCount.textContent = message.text + " online";
          // } else {
          //     displayMessage(message);
          // }

        };

        ws.onclose = function() {
          updateStatus("disconnected");
          addSystemMessage("Disconnected from server.");
          setTimeout(connect, 3000);
        };

        ws.onerror = function(err) {
          console.log("WebSocket error:", err);
        };
      }

      connect();

      // ==========================================
      // TEST IT:
      //   1. go run main.go
      //   2. Open http://localhost:8080
      //   3. Open a SECOND tab, change name to "Dave"
      //   4. Send a message from tab 1 — you should see:
      //      - "Bret joined the chat" in both tabs
      //      - The user count update to "2 online"
      //      - The message appear in both tabs
      //   5. Close one tab — "X left the chat" should appear
      //      and the count should drop
      // ==========================================
    </script>

  </body>
</html>
