<!DOCTYPE html>
<html>
  <head>
    <title>WebSocket Chat Server Test</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: Arial, sans-serif;
        background-color: #1a1a2e;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      #app {
        width: 400px;
        background: white;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      }
      #header {
        background-color: #6c5ce7;
        color: white;
        padding: 12px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      #header h1 { font-size: 18px; font-weight: normal; }
      #name-input {
        padding: 5px 10px;
        border: none;
        border-radius: 12px;
        font-size: 12px;
        width: 90px;
        outline: none;
      }
      #status {
        padding: 6px 20px;
        font-size: 12px;
        background-color: #fff3cd;
        color: #856404;
      }
      #status.connected { background-color: #d4edda; color: #155724; }
      #messages {
        height: 350px;
        overflow-y: auto;
        padding: 15px;
        background-color: #f8f9fa;
      }
      .msg {
        padding: 8px 14px;
        margin: 4px 0;
        border-radius: 14px;
        font-size: 13px;
        max-width: 75%;
        word-wrap: break-word;
      }
      .msg.sent { background-color: #6c5ce7; color: white; margin-left: auto; }
      .msg.received { background-color: #e9ecef; color: #333; margin-right: auto; }
      .msg.system { background-color: #fff3cd; color: #856404; font-style: italic; max-width: 100%; text-align: center; }
      .sender { font-size: 11px; color: #999; margin: 6px 4px 2px; }
      .sender.sent-name { text-align: right; }
      #input-area {
        display: flex;
        padding: 10px;
        border-top: 1px solid #eee;
      }
      #msg-input {
        flex: 1;
        padding: 10px 15px;
        border: 1px solid #ddd;
        border-radius: 20px;
        font-size: 14px;
        outline: none;
      }
      #send-btn {
        background: #6c5ce7;
        color: white;
        border: none;
        padding: 10px 20px;
        margin-left: 8px;
        border-radius: 20px;
        cursor: pointer;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="header">
        <h1>Chat Server Test</h1>
        <input type="text" id="name-input" value="Bret" placeholder="Your name">
      </div>
      <div id="status">Connecting...</div>
      <div id="messages"></div>
      <div id="input-area">
        <input type="text" id="msg-input" placeholder="Type a message...">
        <button id="send-btn">Send</button>
      </div>
    </div>

    <script>
      /*
        This test page connects to your WebSocket server
        and sends JSON messages. Use it to test your
        Lesson 8 server implementation!

        Open TWO browser tabs to see broadcasting work.
        Change the name in one tab to tell them apart.
      */

      let messagesDiv = document.getElementById("messages");
      let msgInput = document.getElementById("msg-input");
      let sendBtn = document.getElementById("send-btn");
      let nameInput = document.getElementById("name-input");
      let statusDiv = document.getElementById("status");

      function addMessage(sender, text, isSent) {
        let senderDiv = document.createElement("div");
        senderDiv.classList.add("sender");
        senderDiv.textContent = sender;
        if (isSent) senderDiv.classList.add("sent-name");

        let msgDiv = document.createElement("div");
        msgDiv.classList.add("msg", isSent ? "sent" : "received");
        msgDiv.textContent = text;

        messagesDiv.appendChild(senderDiv);
        messagesDiv.appendChild(msgDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      }

      function addSystem(text) {
        let div = document.createElement("div");
        div.classList.add("msg", "system");
        div.textContent = text;
        messagesDiv.appendChild(div);
      }

      // Connect to WebSocket
      let ws = new WebSocket("ws://localhost:8080/ws");

      ws.onopen = function() {
        statusDiv.textContent = "Connected to server!";
        statusDiv.classList.add("connected");
        addSystem("Connected! Try opening a second tab.");
      };

      ws.onmessage = function(event) {
        let msg = JSON.parse(event.data);
        let currentUser = nameInput.value.trim();
        let isSent = (msg.sender === currentUser);
        addMessage(msg.sender, msg.text, isSent);
      };

      ws.onclose = function() {
        statusDiv.textContent = "Disconnected";
        statusDiv.classList.remove("connected");
        addSystem("Disconnected from server.");
      };

      function sendMessage() {
        let text = msgInput.value.trim();
        let sender = nameInput.value.trim() || "Anonymous";
        if (!text || ws.readyState !== WebSocket.OPEN) return;

        let msg = {
          sender: sender,
          text: text,
          time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        };

        ws.send(JSON.stringify(msg));
        msgInput.value = "";
        msgInput.focus();
      }

      sendBtn.addEventListener("click", sendMessage);
      msgInput.addEventListener("keydown", function(e) {
        if (e.key === "Enter") sendMessage();
      });

      msgInput.focus();
    </script>
  </body>
</html>
