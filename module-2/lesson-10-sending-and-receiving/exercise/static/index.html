<!DOCTYPE html>
<html>
  <head>
    <title>ChatApp - Sending & Receiving</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: Arial, sans-serif;
        background-color: #1a1a2e;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      #chat-app {
        width: 420px;
        height: 650px;
        background-color: white;
        border-radius: 12px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      }
      #chat-header {
        background-color: #6c5ce7;
        color: white;
        padding: 12px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      #chat-header h1 { font-size: 18px; font-weight: normal; }
      #username-input {
        padding: 5px 10px;
        border: none;
        border-radius: 12px;
        font-size: 12px;
        width: 90px;
        outline: none;
      }
      #connection-status {
        font-size: 11px;
        padding: 6px 12px;
        text-align: center;
      }
      .connecting { background-color: #fff3cd; color: #856404; }
      .connected { background-color: #d4edda; color: #155724; }
      .disconnected { background-color: #f8d7da; color: #721c24; }
      #chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 15px;
        background-color: #f8f9fa;
      }
      .system-msg {
        text-align: center;
        color: #999;
        font-size: 12px;
        margin: 10px 0;
        font-style: italic;
      }
      .message {
        max-width: 75%;
        padding: 10px 15px;
        margin: 4px 10px;
        border-radius: 18px;
        font-size: 14px;
        word-wrap: break-word;
      }
      .message.sent {
        background-color: #6c5ce7;
        color: white;
        margin-left: auto;
      }
      .message.received {
        background-color: #e9ecef;
        color: #333;
        margin-right: auto;
      }
      .sender-name {
        font-size: 11px;
        color: #999;
        margin: 8px 12px 2px 12px;
      }
      .sender-name.sent-name { text-align: right; }
      .time-stamp {
        font-size: 10px;
        color: #bbb;
        margin: 1px 12px 4px 12px;
      }
      .time-stamp.sent-time { text-align: right; }
      #chat-input-area {
        display: flex;
        padding: 10px;
        background-color: white;
        border-top: 1px solid #eee;
      }
      #message-input {
        flex: 1;
        padding: 10px 15px;
        border: 1px solid #ddd;
        border-radius: 20px;
        font-size: 14px;
        outline: none;
      }
      #message-input:focus { border-color: #6c5ce7; }
      #send-btn {
        background-color: #6c5ce7;
        color: white;
        border: none;
        padding: 10px 20px;
        margin-left: 8px;
        border-radius: 20px;
        font-size: 14px;
        cursor: pointer;
      }
      #send-btn:hover { background-color: #5a4bd1; }
      #send-btn:disabled { background-color: #ccc; cursor: not-allowed; }
    </style>
  </head>
  <body>

    <div id="chat-app">
      <div id="chat-header">
        <h1>ChatApp</h1>
        <input type="text" id="username-input" value="Bret" placeholder="Your name">
      </div>
      <div id="connection-status" class="connecting">Connecting...</div>
      <div id="chat-messages"></div>
      <div id="chat-input-area">
        <input type="text" id="message-input" placeholder="Type a message..." disabled>
        <button id="send-btn" disabled>Send</button>
      </div>
    </div>

</html>
