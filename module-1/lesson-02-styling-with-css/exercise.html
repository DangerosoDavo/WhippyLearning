<!DOCTYPE html>
<html>
  <head>
    <title>CSS Exercise</title>
    <style>
      /*
        EXERCISE 1: Change the background color of the whole page.
        Target the "body" selector and set background-color to a color you like.
        Example:
          body {
            background-color: lightyellow;
          }
      */


      /*
        EXERCISE 2: Style the h1 heading.
        - Change its color
        - Center it using text-align
        - Change its font-size
      */


      /*
        EXERCISE 3: Style the class "info-box" below.
        Give it:
        - A background-color (try #e8f4f8)
        - Some padding (try 15px)
        - A border (try: 1px solid #b0d4e3)
        - Rounded corners with border-radius (try 8px)
      */


      /*
        EXERCISE 4: Style the class "warning" to make it stand out.
        Try:
        - color: white
        - background-color: #e74c3c  (a nice red)
        - padding: 10px
        - border-radius: 5px
        - font-weight: bold
      */


      /*
        EXERCISE 5 (BONUS): Style the list items.
        Target "li" and give them some margin-bottom (try 8px)
        to space them out.
      */

    </style>
  </head>
  <body>

    <h1>My Styled Page</h1>

    <div class="info-box">
      <p>This is an info box. It should look like a nice card when you style it!</p>
    </div>

    <p>This is a regular paragraph. It shouldn't have any special styling.</p>

    <p class="warning">Warning! This is an important message!</p>

    <h2>My Favorite Foods</h2>
    <ul>
      <li>Pizza</li>
      <li>Tacos</li>
      <li>Ice Cream</li>
    </ul>

  </body>
</html>
